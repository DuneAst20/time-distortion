<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Distortion</title>
    <style>
        :root {
            --past-color: #888;
            --present-color: #fff;
            --future-color: #0ff;
            --bg-color: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--present-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* No traditional scrolling */
            transition: filter 1s ease, background-color 1s ease;
        }

        /* Canvas acts as our 3D environment */
        #timelineCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let mouse interact with canvas */
        }

        .narrator-text {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease, transform 1s ease, text-shadow 0.5s ease;
            transform: translateY(20px);
        }

        .narrator-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .instruction-text {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: opacity 1s ease;
        }

        /* Past State Visuals */
        body.state-past {
            filter: grayscale(100%) contrast(120%) sepia(20%);
        }
        body.state-past .narrator-text {
            text-shadow: 2px 0 red, -2px 0 blue; /* Glitch effect */
            animation: glitch 0.2s infinite alternate;
        }

        /* Present State Visuals */
        body.state-present {
            filter: none;
        }

        /* Future State Visuals */
        body.state-future {
            filter: saturate(150%) hue-rotate(15deg);
        }
        body.state-future .narrator-text {
            color: var(--future-color);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(255, 0, 255, 0.5);
        }

        @keyframes glitch {
            0% { transform: translate(0) skew(0deg); }
            20% { transform: translate(-2px, 1px) skew(-2deg); }
            40% { transform: translate(2px, -1px) skew(2deg); }
            60% { transform: translate(0) skew(0deg); }
            80% { transform: translate(-1px, 2px) skew(-1deg); }
            100% { transform: translate(1px, -2px) skew(1deg); }
        }

        /* Entry overlay */
        #blackout {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 50;
            transition: opacity 3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="blackout"></div>

    <canvas id="timelineCanvas"></canvas>

    <div id="ui-layer">
        <div id="narrator" class="narrator-text">Time is paused...</div>
        <div id="instruction" class="instruction-text">Scroll or move to begin</div>
    </div>

    <script>
        const canvas = document.getElementById('timelineCanvas');
        const ctx = canvas.getContext('2d');
        const narrator = document.getElementById('narrator');
        const blackout = document.getElementById('blackout');
        const body = document.body;

        let width, height;
        let particles = [];
        const particleCount = 400;

        // Time Engine State
        let timePosition = 0; // Negative = Past, 0 = Present, Positive = Future
        let timeSpeed = 0; // Speed modifier from scroll/mouse
        let targetTimeSpeed = 0;
        let isStarted = false;
        
        // Mouse Tracking
        let lastMousePos = { x: 0, y: 0 };
        let mouseVelocity = 0;

        // Narrator Texts
        const texts = {
            past: "You were searching for direction...",
            present: "This is where you stand now.",
            future: "This version of you is still forming."
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Particle Class
        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(randomZ = false) {
                this.x = (Math.random() - 0.5) * width * 2;
                this.y = (Math.random() - 0.5) * height * 2;
                this.z = randomZ ? Math.random() * 1000 : 1000;
                this.baseSize = Math.random() * 2 + 0.5;
                this.color = Math.random() > 0.5 ? '#ffffff' : '#888888';
            }

            update(speedDir) {
                // Move through Z space based on time direction and speed
                this.z -= speedDir * 5;

                // Loop particles based on direction
                if (this.z < 1) this.reset();
                if (this.z > 1000) this.z = 1;
            }

            draw() {
                // 3D projection math
                const fov = 300;
                const scale = fov / (fov + this.z);
                const px = this.x * scale + width / 2;
                const py = this.y * scale + height / 2;
                const size = this.baseSize * scale * 2;

                if (px >= 0 && px <= width && py >= 0 && py <= height) {
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = Math.max(0, 1 - (this.z / 1000)); // Fade out in distance
                    ctx.fill();
                }
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Core Interaction: Scroll
        window.addEventListener('wheel', (e) => {
            if (!isStarted) startExperience();
            
            // Scroll Up (negative deltaY) = Past. Scroll Down = Future.
            const direction = Math.sign(e.deltaY);
            timePosition += direction * 2;
            
            // Clamp time position
            timePosition = Math.max(-100, Math.min(100, timePosition));
            
            // Add burst of speed to time
            targetTimeSpeed = direction * 4;
            
            updateState();
        });

        // Core Interaction: Mouse Movement (affects time speed)
        window.addEventListener('mousemove', (e) => {
            if (!isStarted) startExperience();

            const dx = e.clientX - lastMousePos.x;
            const dy = e.clientY - lastMousePos.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            mouseVelocity = Math.min(distance * 0.1, 5); // Cap max velocity
            lastMousePos = { x: e.clientX, y: e.clientY };
        });

        function updateState() {
            body.className = '';
            let newText = "";

            if (timePosition < -20) {
                body.classList.add('state-past');
                newText = texts.past;
            } else if (timePosition > 20) {
                body.classList.add('state-future');
                newText = texts.future;
            } else {
                body.classList.add('state-present');
                newText = texts.present;
            }

            if (narrator.innerText !== newText) {
                narrator.classList.remove('visible');
                setTimeout(() => {
                    narrator.innerText = newText;
                    narrator.classList.add('visible');
                }, 500);
            }
        }

        function startExperience() {
            isStarted = true;
            document.getElementById('instruction').style.opacity = '0';
            setTimeout(() => {
                narrator.classList.add('visible');
            }, 1000);
        }

        // Animation Loop
        function animate() {
            // Motion blur effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Friction to slow down time scroll bursts
            targetTimeSpeed *= 0.95; 
            mouseVelocity *= 0.9;

            // Combine scroll intent and mouse energy for total time speed
            let currentDir = targetTimeSpeed !== 0 ? Math.sign(targetTimeSpeed) : (timePosition >= 0 ? 1 : -1);
            
            // Base speed is very slow (frozen present), increases with mouse movement or scroll
            timeSpeed = (targetTimeSpeed + (currentDir * mouseVelocity * 0.5));
            
            // If near present and no interaction, freeze
            if (Math.abs(timePosition) < 5 && Math.abs(targetTimeSpeed) < 0.1 && mouseVelocity < 0.1) {
                timeSpeed = 0.05; // Barely moving
            }

            particles.forEach(p => {
                p.update(timeSpeed);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // Entry Sequence
        setTimeout(() => {
            blackout.style.opacity = '0';
            setTimeout(() => {
                narrator.classList.add('visible');
                blackout.remove();
            }, 3000);
        }, 500);

        animate();
    </script>
</body>
</html>
